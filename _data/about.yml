top_left: >-
  #### PRACTICE


  #### [CREATIVE](/creative)


  I make and produce media, art, research, and editorial projects, with a focus on things that fall between these lines — crafting custom architectures for custom projects.


  #### [RESEARCH](/consulting)


  I investigate and experiment with progressive and divergent ways of making, thinking, and problem-solving with communities around the world. I build structures and facilitate processes for cross-sector collaboration, strategy, and exchange.


  #### ﻿[FUNDRAISING](/consulting)


  I secure funding and support for creative, public, and social-purpose projects, organizations, and networks: small and large, formal and informal, established and emergent.
top_right: >-
  #### CLIENTS


  My client and partner roster includes avant studios, legacy institutions, peer-driven networks and sundry intrepid, independent teams.


  #### INTERESTS


  Deeply rooted in the human, my interests tend toward the liminal, anomalous, and relational. I'm compelled by the porous, interlocking boundaries of entangled subjectivities and the abiding persistence, and infinite potentialities, of an alternative.
main: >-
  #### BIO


  **Amy Gottung** is a producer, director, consultant, researcher, and writer based in Canada. Bridging sectors and disciplines, her practice evades an easy identity, and encompasses a diverse, international roster of projects, clients, and collaborators.  


  As a media and cultural producer, Amy has led the creation and realization of custom XR work, non-fiction television and video, international festivals, art-tech hackathons, operas, and other trans-disciplinary forms.


  As a consultant and fundraiser, she works with organizations in creative, social-purpose, and cross-sector contexts to build strategy, structures, and support. Recent projects include a collaboration with [VibeLab,](https://vibe-lab.org/) a global leader in night culture, on consultations to inform the City of Toronto’s night economy strategy.


  From 2016-2020 Amy served as the Executive Director of Toronto’s singular “anarchic, circus-like” music and art series, [Long Winter](http://www.torontolongwinter.com/about) (Rolling Stone), where she helped establish collective-based frameworks and a board of directors; initiated international co-productions with the development of two original festivals in Toronto and Paris, France; tripled revenue and activity; and ushered the organization into annual operating funding streams.


  Amy is the founder of several cross-sector [interventions](http://www.torontolongwinter.com/diyspace) and [international exchanges](https://toronto.paris/) in support of alternative cultural scenes and spaces, including a festival and research conference, co-presented by Long Winter (Toronto) and [La Station Gare des Mines](https://lastation.paris/) (Paris) in 2021, and the DIY Space Project: a multi-city research and advocacy program realized in partnership with [Trans Europe Halles](https://teh.net/) (a network of 160+ grassroots cultural centres) and leaders from government, real estate, and culture in Canada and Europe. She is currently one of seven core partners leading [Alterplaces](https://alterplaces.com/): a trans-disciplinary, trans-national research project focused on the sustainability of alternative cultural spaces, based out of the Université Sorbonne Nouvelle, and funded by a grant from the European Union.  


  Amy was a co-creator and creative producer of [A More Beautiful Journey](https://www.youtube.com/watch?v=_mnJavvnby8)*,* a custom augmented reality app that animated hundreds of kilometres of Toronto public transit line with original, spatialized music and sound from nearly 40 artists and ensembles. The interactive app was available free of charge to TTC riders and listeners around the world from September 2022 - June 2023.


  Amy holds a SSHRC-funded M.A. (University of Toronto) and a B. Mus (McGill University). She has lived and worked in Toronto, New York, Montréal, Sagueney (QC), Zürich, Massachusetts, Connecticut, and British Columbia. She speaks English and (pretty good) French. 


  Amy was a co-founding director of - among other projects - KRAK XR, an experimental media company (Karen Vanderborght, Creative Director) and ChangeUp, a collaborative art-tech hackathon (2018). She currently leads business and funding development for [Halocline Trance](https://haloclinetrance.bandcamp.com/), one of Canada’s most forward-thinking music labels.


  Amy collaborates and experiments with partners around the world.
