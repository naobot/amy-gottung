top_left: >-
  #### PRACTICE


  #### [CREATIVE](/creative)


  I make and produce media, art, research, and editorial projects, with a focus on things that fall between these lines — crafting custom architectures for custom projects.


  #### [RESEARCH](/consulting)


  I have worked as a researcher and consultant for documentary films, sector development projects, government, independent businesses, non-profits, and community alliances. Independently and for clients, I design structures and facilitate processes for cross-sector collaboration and strategic development. My research is currently focused on experimental models of creative, social, spatial and discursive “production” - actual and speculative.


  #### ﻿[FUNDRAISING](/consulting)


  I secure funding and build strategy and support for creative, public, and social-purpose projects, organizations, and networks: small and large, formal and informal, established and emergent.
top_right: >-
  #### CLIENTS


  My client and partner roster includes avant studios, legacy institutions, peer-driven networks and sundry intrepid, independent teams.


  #### INTERESTS


  My interests tend toward the liminal, anomalous, divergent, and relational. I'm compelled by the porous, interdependent boundaries of entangled subjectivities, and the abiding persistence, and infinite potentialities, of an “otherwise”.
main: >-
  **Amy Gottung** is a producer, director, consultant, researcher, and writer
  based in Canada. Bridging sectors and disciplines, her practice evades an easy
  identity, and encompasses a diverse, international roster of projects,
  clients, and collaborators.


  As a creative producer, Amy has led the creation and realization of custom XR work, non-fiction television and video, international festivals, art-tech hackathons, operas, and other trans-disciplinary forms.


  As a consultant and fundraiser, she works with organizations in creative, social purpose, and cross-sector contexts to build strategy and support. She recently served as the lead local consultant to [VibeLab](https://vibe-lab.org/), a global leader in night culture, and the City of Toronto on the development of the City’s night economy strategy.


  From 2016-2020 Amy acted as Executive Director of Toronto’s singular “anarchic, circus-like” music and art series, [Long Winter](http://www.torontolongwinter.com/about) (Rolling Stone). In three charged seasons she co-developed collective-based frameworks and a first board of directors; initiated international co-productions with the launch of two original festival presentations in Toronto and Paris, France; tripled revenue and activity; and ushered the organization into annual operating funding streams.


  Amy is the founder of several cross-sector [interventions](http://www.torontolongwinter.com/diyspace) and [international exchanges](https://toronto.paris/) in support of alternative cultural scenes and spaces, including a festival and research conference, co-presented by Long Winter (Toronto) and [La Station Gare des Mines](https://lastation.paris/) (Paris) in 2021, and the DIY Space Project: a multi-city research and advocacy program realized in partnership with [Trans Europe Halles](https://teh.net/) (a network of 160+ grassroots cultural centres) and leaders from government, real estate, and culture in Canada and Europe. She is currently one of seven core partners leading [Alter-Places](https://alterplaces.com/): a trans-disciplinary, trans-national research project focused on the sustainability of alternative cultural spaces, based out of the Université Sorbonne Nouvelle, and funded by a grant from the European Union.


  Amy was a co-creator and creative producer of [A More Beautiful Journey](https://www.youtube.com/watch?v=_mnJavvnby8), a custom augmented reality app that animated hundreds of kilometres of Toronto public transit line with original, spatialized music and sound from nearly 40 artists and ensembles. The interactive app was available free of charge to TTC riders and listeners around the world from September 2022 - June 2023. She was a co-founding director of - among other projects - [KRAK XR](https://www.krakxr.co/), an experimental media company (with Karen Vanderborght, Creative Director) and ChangeUp, a collaboratively organized art-tech hackathon at Toronto Media Arts Centre (2018). She currently leads business and funding development for [Halocline Trance](https://haloclinetrance.bandcamp.com/), one of Canada’s most forward-thinking music labels.


  Amy holds a SSHRC-funded M.A. (University of Toronto) and a B. Mus (McGill University). She has lived and worked in Toronto, New York, Montréal, Sagueney (QC), Zürich, Massachusetts, Connecticut, and British Columbia. She speaks English and (pretty good) French.


  Always looking for the others, Amy collaborates with partners around the world.
