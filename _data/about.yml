top_left: >-
  #### [CREATIVE](/creative)


  I make media, art, research, and editorial projects, with a focus on things that fall between these lines, crafting custom architectures for custom projects.


  #### ﻿[FUNDRAISING](/consulting)


  I secure funding and build strategy and support for creative, public, and social-purpose projects, organizations, and networks: small and large, formal and informal, established and emergent.  The majority of my fundraising work has been focused in culture, food security, poverty reduction, and social justice. 


  #### [RESEARCH](/consulting)


  I have worked as a researcher and consultant for sector development projects, documentaries, government, non-profits, and collectives. I design structures and facilitate processes for cross-sector and inter-disciplinary collaboration. My current research projects are focused around experimental models of creative, social, and spatial production.
top_right: >-
  #### CLIENTS


  My client and partner roster includes avant studios, legacy institutions, peer-driven networks and sundry intrepid, independent teams.


  #### INTERESTS


  My curiosity tends toward the liminal, anomalous, divergent, and relational. I'm compelled by the porous, interdependent boundaries of entangled subjectivities, and the abiding persistence, and infinite potentialities, of the not-yet-known.
main: >-
  **Amy Gottung** is a producer, director, consultant, researcher, and writer
  based in Canada. Bridging sectors and disciplines, her practice evades an easy
  identity, and encompasses a diverse, international roster of projects,
  clients, and collaborators.


  As a creative producer, Amy has led the development and realization of experimental media, non-fiction television and video, international festivals, hackathons, operas, and other trans-disciplinary forms. Recent  projects include [A More Beautiful Journey](https://www.youtube.com/watch?v=_mnJavvnby8), a custom augmented reality app that animated hundreds of kilometres of Toronto public transit line with original, spatialized music and sound from over 30 artists. The interactive app was available free of charge to TTC riders and listeners around the world from 2022-2023. 


  As a consultant and fundraiser, Amy works with organizations in creative, social purpose, and cross-sector contexts to build strategy and support. She recently served as the lead local consultant to [VibeLab](https://vibe-lab.org/), a global leader in night culture, and the City of Toronto on the development of the City’s night economy strategy. She currently leads business development for the experimental music label [Halocline Trance](https://haloclinetrance.bandcamp.com/)


  From 2016-2020 Amy served as Executive Director of Toronto’s singular “anarchic, circus-like” music and art series, [Long Winter](http://www.torontolongwinter.com/about) (Rolling Stone). In three charged seasons she co-developed collective-based frameworks, initiated international co-productions with the creation of two original festivals in Toronto and Paris (Fr), tripled revenue and activity , and ushered the organization into annual operating funding streams.    


  Amy is the founder of several cross-sector [interventions](http://www.torontolongwinter.com/diyspace) and [international exchanges](https://toronto.paris/) in support of alternative cultural scenes and spaces, including a festival and research conference, co-presented by Long Winter (Toronto) and [La Station Gare des Mines](https://lastation.paris/) (Paris) in 2021, and a capacity-building program for DIY spaces, realized in partnership with [Trans Europe Halles](https://teh.net/) and leaders from government, real estate, and culture. She is currently one of six core partners leading [Alter-Places](https://alterplaces.com/): a trans-disciplinary, trans-national research project focused on the sustainability of alternative cultural spaces, based out of the Université Sorbonne Nouvelle and funded by the European Union.  


  Amy has lived and worked in Toronto, New York, Montréal, Sagueney (QC), Zürich, Massachusetts, Connecticut, and British Columbia. She speaks English and (pretty good) French.


  Always looking for the others, Amy collaborates with partners around the world.
