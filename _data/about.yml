top_left: >-
  #### [CREATIVE](/creative)


  I create and produce media, culture, and research, with a focus on things that fall between these lines, crafting custom architectures for custom work.


  #### ﻿[DEVELOPMENT & FUNDRAISING](/consulting)


  I shape strategy and secure funding for creative, public, and social-purpose projects, organizations, and networks: small and large, formal and informal, established and emergent, local and global. 


  I've raised millions in project and operating funding for mission-driven initiatives across arts and culture, media, social services, place-making, and community development. 


  #### [RESEARCH](/consulting)


  A﻿s a researcher I've contributed to public policy and sector development (cultural spaces, creative industries, nighttime economies), as well as documentary productions (PBS et al.). 


  I have a passion for complex problem definition and analysis, and build evidence-based strategies through a combination of robust research and - my favourite medium - deep interpersonal exchange.
top_right: >-
  #### CLIENTS


  My client and partner roster includes legacy institutions, international networks, experimental collectives, and sundry intrepid, independent teams.  


  #### INTERESTS


  My curiosity tends toward the liminal, anomalous, divergent, and relational. I'm compelled by the porous, interdependent boundaries of entangled subjectivities, and the abiding persistence, and infinite potentialities, of the not-yet-known. A dynamic collaborator and problem-solver, I am passionate about helping others do things worth doing, make things worth making, fight things worth fighting, and change things worth changing.  I enjoy weaving a feedback loop between the macro and the micro; working with complex systems and intimate narratives.


  #### STYLE


  * F﻿lexible, collaborative, candid 

  * A﻿nalytical, thorough

  * Values, impact, and people-driven
main: >-
  **Amy Gottung** is a producer and social-purpose strategist based in Canada.
  Bridging sectors and disciplines, her practice evades an easy identity, and
  encompasses a diverse, international roster of projects, clients, and
  collaborators.  


  As a **creative producer**, Amy has led the development and realization of live music and performance, experimental media, operas, hackathons, and other trans-disciplinary forms. She has worked in documentary production (PBS, Florentine Films), presented at [Luminato](https://www.luminatofestival.com/?gad_source=1&gbraid=0AAAAADmUyhBk8cBBgCEI2gZ6E2-xncR00&gclid=Cj0KCQjww-HABhCGARIsALLO6Xwk0rirO3FtR9cKzshgwgU9ghHACyNb4GFnrq6N4U2xlwWuMzdeQiUaAoEPEALw_wcB), and led a number of singular, flagship cultural projects like *[A More Beautiful Journey](https://www.youtube.com/watch?v=_mnJavvnby8)*, a custom augmented reality app that animated hundreds of kilometres of Toronto public transit line with site-specific, spatialized music and sound. 


  As a **fundraising and development consultant**, Amy generates strategy and secures funding for clients across non-profit and public sectors. She has supported global music industry initiatives ([Keychange](https://www.keychange.eu/)), food security and community development (Daily Bread, North York Harvest, The Stop Community Food Centre), collective cultural infrastructure ([221A](https://221a.ca/)), public space-making ([The Laneway Project](https://www.thelanewayproject.ca/)), and science engagement (Royal Canadian Institute of Science), alongside a long list of independent creative projects (from [music labels](https://www.haloclinetrance.com/) to [films](https://myfriendharryfilm.com/) to [XR media](https://www.krakxr.co/)).


  With a penchant for cross-sector work, she has served in key roles on a number of **cultural policy** projects, including as the lead local consultant to [VibeLab](https://vibe-lab.org/), a global leader in night culture, and the City of Toronto on early development of the City’s Night Economy Strategy.    


  From 2016-2020 Amy was **Executive Director** of Toronto’s singular “anarchic, circus-like” music and art series, [Long Winter](http://www.torontolongwinter.com/about) (Rolling Stone), presenting hundreds of experimental artists in festival events. In three seasons she helped build collective-based frameworks and a board of directors, introduced international co-productions with the launch of two festivals focused on underground scenes in Toronto and Paris (Fr), more than tripled revenue and activity, and ushered the organization into annual operating funding streams.   


  Amy is the **founder** of several cross-sector [interventions](http://www.torontolongwinter.com/diyspace) and international exchanges in support of self-organized and underground culture, including a co-located transmedia festival, music industry conference, and research symposium, co-presented by Long Winter (Toronto) and [La Station Gare des Mines](https://lastation.paris/) (Paris) in partnership with Toronto Metropolitan University and the Université de Rouen in 2021, and a capacity-building program for DIY spaces, realized in partnership with [Trans Europe Halles](https://teh.net/) and leaders from government, real estate, and culture. Alongside a transnational team, she served as one of the research and program leads for [Alter-Places](https://alterplaces.com/): a European Union-funded project exploring the sustainability of alternative cultural spaces, led by LabEx ICCA at the Université Sorbonne Nouvelle.  


  A﻿my holds a SSHRC-funded M.A. from the University of Toronto and a B. Mus from McGill University. She has been based in Toronto, New York, Montréal, and Vancouver, and speaks English and (pretty good) French. Amy is an active classical singer and trains Brazilian jiu-jitsu.


  Always looking for the others, Amy works in cooperation with values-aligned partners around the world.
