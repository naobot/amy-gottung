  #### INTERESTS


  My interests, deeply rooted in the human, tend towards the liminal, collective, transpersonal, and transmutational. I’m fascinated by the porous, relational boundaries of individual phenomenologies and epistemologies, and compelled by the abiding persistence, and infinite potentialities, of the not-yet-known.
main: >-
  #### BIO


  **Amy Gottung**  is a director, producer, consultant,  fundraiser, and writer based in Canada. Bridging sectors and disciplines, her practice evades an easy identity, and encompasses a diverse, international roster of projects, clients, and collaborators.   


  As a media and cultural producer, Amy has led the creation and realization of custom XR work, non-fiction television and video, international festivals, art-tech hackathons, operas, and other trans-disciplinary forms.


  As a consultant and fundraiser, Amy works with organizations in creative, social-purpose, and cross-sector contexts to build strategy, structures, and support. Recent projects include a collaboration with [VibeLab,](https://vibe-lab.org/) a global leader in night culture, on consultations to inform the City of Toronto’s night economy strategy.   


  From 2016-2020 Amy served as the Executive Director of Toronto’s singular “anarchic, circus-like” alternative music and art series, [Long Winter](http://www.torontolongwinter.com/about) (Rolling Stone), founded in 2012. In three seasons, she helped to establish collective-based frameworks and a board of directors, introduced international collaborations with the co-production of a 2019 festival in Paris, France, tripled revenue and activity, and ushered the organization into annual operating funding streams. 


  Amy is the founder of several cross-sector [interventions](http://www.torontolongwinter.com/diyspace) and [international exchanges](https://toronto.paris/) in support of alternative cultural scenes and spaces. Initiatives include a festival and research conference, co-presented by Long Winter (Toronto) and [La Station Gare des Mines](https://lastation.paris/) (Paris) in 2021, and the DIY Space Project: a multi-city research and advocacy program realized in partnership with [Trans Europe Halles](https://teh.net/) (a network of 100+ grassroots cultural centres) and leaders from government, real estate, and culture in Canada and Europe. 


  Amy was a co-creator and creative producer of [A More Beautiful Journey](https://www.youtube.com/watch?v=_mnJavvnby8)*,* a custom augmented reality app that animated hundreds of kilometres of Toronto public transit line with original, spatialized music and sound from nearly 40 artists and ensembles. The interactive app was available free of charge to TTC riders and listeners around the world from September 2022 - June 2023. 


  Amy holds a SSHRC-funded M.A. from the University of Toronto and a B. Mus from McGill University. She has lived and worked in Toronto, New York, Montréal, Sagueney (QC), Zürich, Massachusetts, Connecticut, and British Columbia. She speaks English and (pretty good) French.


  Amy collaborates and experiments with partners around the world.
