top_left: >-
  #### [CREATIVE](/creative)


  I create and produce media, culture, and research, with a focus on things that fall between these lines, crafting custom architectures for custom work.


  #### ﻿[DEVELOPMENT & FUNDRAISING](/consulting)


  I shape strategy and secure funding for creative, public, and social-purpose projects, organizations, and networks: small and large, formal and informal, established and emergent, local and global. I have generated support for activity spanning arts/culture, experimental media, food security, economic development, place-making, social justice, immigrant / newcomer services, and social enterprise. 


  #### [RESEARCH](/consulting)


  As a researcher and consultant I have worked for government, non-profits, non-fiction television and film, sector development initiatives,  and international research projects.
top_right: >-
  #### CLIENTS


  My client and partner roster includes avant studios, legacy institutions, peer-driven networks and sundry intrepid, independent teams. 


  #### INTERESTS


  My curiosity tends toward the liminal, anomalous, divergent, and relational. I'm compelled by the porous, interdependent boundaries of entangled subjectivities, and the abiding persistence, and infinite potentialities, of the not-yet-known. A dynamic collaborator and problem-solver, I am passionate about helping others do things worth doing, make things worth making, fight things worth fighting, and change things worth changing.  I enjoy tracing a feedback loop between the macro and the micro; working with complex systems and nuanced personal narratives.  


  #### STYLE


  * F﻿lexible, collaborative, solutions-focused

  * Strategic, creative, analytical, detail-oriented 

  * Values-driven - I bring genuine care and commitment to the projects and people I invest in
main: >-
  **Amy Gottung** is a creative consultant based in Canada. Bridging sectors and
  disciplines, her practice evades an easy identity, and encompasses a diverse,
  international roster of projects, clients, and collaborators.  


  As a **creative producer**, Amy has led the development and realization of live music and performance, experimental media, operas, hackathons, and other trans-disciplinary forms. She has worked in documentary production (PBS, Florentine Films), presented at [Luminato](https://www.luminatofestival.com/?gad_source=1&gbraid=0AAAAADmUyhBk8cBBgCEI2gZ6E2-xncR00&gclid=Cj0KCQjww-HABhCGARIsALLO6Xwk0rirO3FtR9cKzshgwgU9ghHACyNb4GFnrq6N4U2xlwWuMzdeQiUaAoEPEALw_wcB), and spearheaded a number of independent projects like [A More Beautiful Journey](https://www.youtube.com/watch?v=_mnJavvnby8), a custom augmented reality app that animated hundreds of kilometres of Toronto public transit line with site-specific, spatialized music and sound from over 30 artists.  


  As a **development consultant**, Amy has worked with a wide range of organizations in creative, social purpose, and cross-sector contexts to build strategy, funding, and impact. She recently joined [Keychange](https://www.keychange.eu/), a global network and movement pursuing an equitable restructuring of the music industry, in the role of development manager. She has worked with clients in food security and community development (Daily Bread, North York Harvest, The Stop Community Food Centre), cultural infrastructure ([221A](https://221a.ca/)), public space-making (The Laneway Project), environmental advocacy (GreenPAC), and a range of other milieus. Amy served as the lead local consultant [VibeLab](https://vibe-lab.org/), a global leader in night culture, and the City of Toronto on the development of the City’s Night Economy Strategy, and she currently supports funding and business development for the experimental music label [Halocline Trance](https://haloclinetrance.bandcamp.com/), among other collaborators.  


  From 2016-2020 Amy was **Executive Director** of Toronto’s singular “anarchic, circus-like” music and art series, [Long Winter](http://www.torontolongwinter.com/about) (Rolling Stone), for which she co-programmed and presented hundreds of artists and collectives in 25+ festival events. In three seasons she initiated and co-developed collective-based frameworks, a first arms-length Board of Directors, and strategic planning processes. She introduced international co-productions with the co-creation of two festivals focused on underground scenes in Toronto and Paris (Fr), more than tripled revenue and activity, and ushered the organization into annual operating funding streams.     


  Amy is the **founder** of several cross-sector [interventions](http://www.torontolongwinter.com/diyspace) and international exchanges in support of experimental and underground culture, including a co-located transmedia festival, music industry conference, and research symposium, co-presented by Long Winter (Toronto) and [La Station Gare des Mines](https://lastation.paris/) (Paris) in partnership with Toronto Metropolitan University and the Université de Rouen in 2021, and a capacity-building program for DIY spaces, realized in partnership with [Trans Europe Halles](https://teh.net/) and leaders from government, real estate, and culture. Alongside a transnational team of academics and cultural collectives, she served as one of the core research and delivery leads for [Alter-Places](https://alterplaces.com/): a Creative Europe-funded project exploring the sustainability of alternative cultural spaces, led by LabEx ICCA at the Université Sorbonne Nouvelle.  


  A﻿my holds a SSHRC-funded M.A. from the University of Toronto and a B. Mus from McGill University. She has lived and worked in Toronto, New York, Montréal, Sagueney (QC), Massachussetts, and Vancouver. She speaks English and (pretty good) French. 


  Always looking for the others, Amy collaborates with partners around the world.
