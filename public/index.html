          <script type="text/javascript">
            window.addEventListener('load', function () {
              var converter = new showdown.Converter();
              for (const elem of document.getElementsByClassName('convert-md')) {
                var md = elem.dataset.md;
                var html = converter.makeHtml(md);
                elem.innerHTML = html;
              }

              const workCategoriesContainer = document.getElementsByClassName('work-categories-container')[0];
              const workCategories = document.getElementsByClassName('work-categories')[0];

              workCategoriesContainer.addEventListener("mouseover", event => {
                workCategories.classList.remove("hidden-nav");
              });

              workCategoriesContainer.addEventListener("mouseout", event => {
                workCategories.classList.add("hidden-nav");
              });
            });
          </script>
